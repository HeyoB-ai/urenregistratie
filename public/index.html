<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inloggen — QBTec Urenregistratie</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <img
      class="login-logo"
      src="https://www.qbtec.nl/wp-content/webp-express/webp-images/uploads/2020/11/logo-qbtec.png.webp"
      alt="QBTec">
    <h1 class="login-title">Urenregistratie</h1>

    <form id="login-form" novalidate>
      <div class="login-field">
        <label for="email">E-mailadres</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <button id="login-button" class="login-button" type="submit">Stuur inloglink</button>
    </form>

    <div id="password-login" style="margin-top:16px;border-top:1px solid #dde2ea;padding-top:16px;">
      <label style="font-size:12px;color:#5a6a7e;">Wachtwoord (tijdelijk voor testen)</label>
      <input type="password" id="password-input"
        style="width:100%;padding:10px;border:1px solid #dde2ea;border-radius:6px;margin-top:6px;box-sizing:border-box;">
      <button type="button" id="password-login-button" class="login-button" style="margin-top:8px;">Inloggen met wachtwoord</button>
    </div>

    <div id="login-message" class="login-message" hidden></div>
  </main>

  <script type="module">
    import { sendMagicLink } from './assets/auth.js'
    import { supabase } from './assets/supabase.js'
    import { checkAuthAndRedirect } from './assets/auth.js'

    const form = document.getElementById('login-form')
    const button = document.getElementById('login-button')
    const emailInput = document.getElementById('email')
    const message = document.getElementById('login-message')

    function showMessage(type, text) {
      message.className = 'login-message ' + type
      message.textContent = text
      message.hidden = false
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = emailInput.value.trim()
      if (!email) {
        emailInput.focus()
        return
      }
      button.disabled = true
      button.textContent = 'Versturen…'
      message.hidden = true

      const error = await sendMagicLink(email)

      if (error) {
        showMessage('error', 'Er ging iets mis: ' + (error.message || 'probeer het opnieuw.'))
        button.disabled = false
        button.textContent = 'Stuur inloglink'
      } else {
        showMessage('success', 'Controleer uw e-mail voor de inloglink.')
        form.hidden = true
      }
    })

    const passwordButton = document.getElementById('password-login-button')
    const passwordInput = document.getElementById('password-input')

    passwordButton.addEventListener('click', async () => {
      const email = emailInput.value.trim()
      const password = passwordInput.value
      if (!email) { emailInput.focus(); return }
      if (!password) { passwordInput.focus(); return }

      passwordButton.disabled = true
      passwordButton.textContent = 'Inloggen…'
      message.hidden = true

      const { error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        showMessage('error', 'Login mislukt: ' + (error.message || 'probeer opnieuw.'))
        passwordButton.disabled = false
        passwordButton.textContent = 'Inloggen met wachtwoord'
      } else {
        await checkAuthAndRedirect()
      }
    })
  </script>
</body>
</html>
